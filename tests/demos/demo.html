<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cradic Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Noto Sans CJK SC', 'Noto Serif CJK SC', system-ui;
      padding: 16px;
      font-size: 20px;
    }
    #input {
      width: 100%;
      height: 44px;
      padding: 0 12px;
      margin-bottom: 12px;
      font-size: inherit;
    }
    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    button {
      height: 44px;
      width: 44px;
      padding: 0;
      font-size: 24px;
      cursor: pointer;
      border: 0.5px solid #ccc;
      background: #fff;
      border-radius: 6px;
    }
    button:active { background: #e0e0e0; }
    #output { margin-top: 8px; }
    #gotoGitHub {
      background: #f6f8fa;
      border-color: #d0d7de;
    }
  </style>
</head>

<body>
  <input id="input" value="汉字测试" placeholder="输入汉字...">
  <div class="button-row">
    <button id="generate" title="生成 HTML">🛠️</button>
    <button id="copyText" title="复制文本">📋</button>
    <button id="download" title="下载 HTML">📥</button>
    <button id="gotoGitHub" title="GitHub 项目地址">🔗</button>
  </div>
  <div id="output"></div>

  <script type="module">
    import { from } from '../../dist/cradic.browser.js';

    const input = document.getElementById('input');
    const generate = document.getElementById('generate');
    const copyText = document.getElementById('copyText');
    const output = document.getElementById('output');

    // 生成 HTML 并展示
    generate.addEventListener('click', async () => {
      output.innerHTML = await from(input.value).to('html').toStr()
    });

    // 复制纯文本到剪贴板
    copyText.addEventListener('click', async () => {
      const text = input.value;
      try {
        const result = await from(text).to('text').with({ sep: 'auto' }).toStr();
        await navigator.clipboard.writeText(result);
        copyText.textContent = '✓';
        setTimeout(() => {
          copyText.textContent = '📋';
        }, 1500);
      } catch (err) {
        alert('Failed to copy: ' + err.message);
      }
    });

    document.getElementById('download').addEventListener('click', async () => {
      await from(input.value).to('html').saveAs('new.html');
    });

    document.getElementById('gotoGitHub').addEventListener('click', () => {
      window.open('https://github.com/ldlsn1/cradic', '_blank', 'noopener,noreferrer');
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') generate.click();
    });

    generate.click();
  </script>
</body>
</html>
